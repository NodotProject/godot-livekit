name: Build and Test
on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test for ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            platform: linux
          - os: windows-latest
            os-name: Windows
            platform: windows
          - os: macos-latest
            os-name: macOS
            platform: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install SCons
      run: pip install scons

    - name: Build GDExtension
      shell: bash
      run: ./build.sh ${{ matrix.platform }}

    - name: Download Godot 4 Headless
      if: matrix.platform != 'windows'
      run: |
        if [ "${{ matrix.platform }}" == "linux" ]; then
          wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip Godot_v4.5-stable_linux.x86_64.zip
          mv Godot_v4.5-stable_linux.x86_64 godot
        elif [ "${{ matrix.platform }}" == "macos" ]; then
          wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_macos.universal.zip
          unzip Godot_v4.5-stable_macos.universal.zip
          mv Godot.app/Contents/MacOS/Godot godot
        fi
        chmod +x godot

    - name: Install coreutils for timeout (macOS)
      if: matrix.platform == 'macos'
      run: brew install coreutils

    - name: Install GUT
      if: matrix.platform != 'windows'
      run: |
        git clone --depth 1 --branch v9.3.0 https://github.com/bitwes/Gut.git /tmp/gut
        mkdir -p addons
        cp -r /tmp/gut/addons/gut addons/gut
        rm -rf /tmp/gut

    - name: Run tests
      if: matrix.platform != 'windows'
      run: ./test.sh

    - name: Upload test results
      if: matrix.platform != 'windows' && always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os-name }}
        path: test_results.xml
        if-no-files-found: ignore
