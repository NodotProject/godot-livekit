name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            platform: linux
          - os: windows-latest
            os-name: Windows
            platform: windows
          - os: macos-latest
            os-name: macOS (arm64)
            platform: macos
            arch: arm64
          - os: macos-13
            os-name: macOS (x86_64)
            platform: macos
            arch: x86_64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxext-dev libxfixes-dev libxinerama-dev libwayland-dev libpipewire-0.3-dev libsystemd-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            godot-cpp
          key: deps-${{ matrix.platform }}-${{ matrix.arch || matrix.platform }}-${{ hashFiles('build.sh') }}

      - name: Build GDExtension
        shell: bash
        run: ./build.sh ${{ matrix.platform }} ${{ matrix.arch || '' }}

      - name: Package addon
        shell: bash
        run: |
          mkdir -p package/addons/godot-livekit
          cp -r addons/godot-livekit/* package/addons/godot-livekit/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-livekit-${{ matrix.platform }}-${{ matrix.arch || matrix.platform }}
          path: package/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine builds
        run: |
          mkdir -p release_package/addons/godot-livekit/bin

          # Copy each platform's artifact contents to merge them
          for dir in artifacts/godot-livekit-*/; do
            cp -r "$dir"/addons/godot-livekit/* release_package/addons/godot-livekit/
          done

          cd release_package
          zip -r ../godot-livekit-release.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: godot-livekit-release.zip
          name: godot-livekit-${{ github.ref_name }}
